name = "hultberg-org"
main = "src/index.ts"
compatibility_date = "2024-06-28"
format = "modules"

[observability.logs]
enabled = true

[assets]
directory = "./public"
binding = "ASSETS"

# KV Namespaces for blog updates feature
# AUTH_KV: Stores magic link tokens for authentication
# RATE_LIMIT_KV: Stores rate limiting counters per IP address

[[kv_namespaces]]
binding = "AUTH_KV"
id = "df4d84d51edd4103b0657860ecfa8453"
preview_id = "c3b1ac5eaae44f56b2aca621d87160ef"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "67fa0308c3614932a44c29c64e48b1c8"
preview_id = "ad999a0cd6394a6ba1ce76e6cebe4e0a"

# GSC_KV: Stores daily Google Search Console snapshots and alert dedup keys.
[[kv_namespaces]]
binding = "GSC_KV"
id = "0d1de10cd31b426ea4a4db2cb1eceb78"
preview_id = "c0b1819261d2482cbadb775201d3830e"

# Cloudflare Email Sending binding (beta). Sends GSC alert emails.
# Magic-link auth emails still go through Resend (src/email.ts) until this service is GA.
[[send_email]]
name = "SEND_EMAIL"

# Daily GSC poll — 08:00 UTC.
[triggers]
crons = ["0 8 * * *"]
